name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/Mine-server-0.0.1-SNAPSHOT.jar"
        target: "/home/ubuntu/deploy"
        strip_components: 2

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo mv /home/ubuntu/deploy/Mine-server-0.0.1-SNAPSHOT.jar /opt/mine/app.jar
          sudo systemctl restart mine
          sleep 10
          sudo systemctl status mine

    - name: Setup SSL and Nginx
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Nginx 및 Certbot 설치
          sudo apt-get update
          sudo apt-get install -y nginx certbot python3-certbot-nginx

          # 2. Nginx 설정 파일 생성 (있을 경우 건너뜀)
          if [ ! -f /etc/nginx/sites-available/mine ]; then
            sudo bash -c 'cat > /etc/nginx/sites-available/mine <<EOF
          server {
              listen 80;
              server_name api.minelover.com;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF'
            sudo ln -s /etc/nginx/sites-available/mine /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
          fi

          # 3. Nginx 테스트 및 실행
          sudo nginx -t && sudo systemctl restart nginx

          # 4. SSL 인증서 발급 (인증서가 없을 때만 실행)
          if [ ! -d /etc/letsencrypt/live/api.minelover.com ]; then
            sudo certbot --nginx -d api.minelover.com --non-interactive --agree-tos -m jangjimin9766@gmail.com
          fi

    - name: Discord Notification
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "🚀 배포 ${{ job.status == 'success' && '완료!' || '실패 ❌' }}"
        description: |
          **환경**: Production (EC2)
          **브랜치**: `${{ github.ref_name }}`
          **커밋**: `${{ github.sha }}`
          **실행자**: ${{ github.actor }}
        color: ${{ job.status == 'success' && '0x00FF00' || 'FF0000' }}
